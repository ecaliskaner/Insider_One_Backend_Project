name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build, Lint, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Dependencies
        run: go mod download

      - name: Run go fmt
        run: if [ "$(go fmt ./... | wc -l)" -gt 0 ]; then echo "Code formatting issues found. Please run 'go fmt ./...' locally."; exit 1; fi

      - name: Run go vet
        run: go vet ./...

      - name: Run Unit Tests
        run: go test -v ./...

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t league-simulation-api:test .
