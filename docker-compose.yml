version: '3.8'

services:
  api:
    build: .
    container_name: league-simulation-api
    ports:
      - "8080:8080"
    volumes:
      - league_data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/league.db
      - SIM_SEED=42
      - WEATHER_PROVIDER=local
      - TEAM_STRENGTH_PROVIDER=local
    command: /bin/sh -c "./main migrate up && ./main seed && ./main serve"
    restart: unless-stopped

volumes:
  league_data:
