basePath: /api/v1
definitions:
  handlers.EditMatchRequest:
    properties:
      away_score:
        example: 1
        type: integer
      home_score:
        example: 3
        type: integer
    type: object
  handlers.ProblemDetails:
    properties:
      detail:
        description: Human-readable explanation specific to this occurrence
        type: string
      instance:
        description: URI reference that identifies the specific occurrence
        type: string
      status:
        description: HTTP status code
        type: integer
      title:
        description: Short, human-readable summary
        type: string
      type:
        description: URI reference that identifies the problem type
        type: string
    type: object
  models.LeagueOverview:
    properties:
      current_week:
        type: integer
      predictions:
        items:
          $ref: '#/definitions/models.Prediction'
        type: array
      standings:
        items:
          $ref: '#/definitions/models.Standing'
        type: array
      weeks:
        items:
          $ref: '#/definitions/models.WeekResult'
        type: array
    type: object
  models.Match:
    properties:
      away_score:
        description: nil if not played
        type: integer
      away_team:
        type: string
      away_team_id:
        type: integer
      home_score:
        description: nil if not played
        type: integer
      home_team:
        type: string
      home_team_id:
        type: integer
      id:
        type: integer
      status:
        description: scheduled, played, edited
        type: string
      weather_condition:
        description: sunny, rainy, snowy, windy, foggy
        type: string
      week:
        type: integer
    type: object
  models.Prediction:
    properties:
      championship_win_pct:
        type: number
      team_id:
        type: integer
      team_name:
        type: string
    type: object
  models.Standing:
    properties:
      drawn:
        type: integer
      ga:
        description: goals against
        type: integer
      gd:
        description: goal difference
        type: integer
      gf:
        description: goals for
        type: integer
      lost:
        type: integer
      played:
        type: integer
      points:
        type: integer
      position:
        type: integer
      team_id:
        type: integer
      team_name:
        type: string
      won:
        type: integer
    type: object
  models.TeamMetrics:
    properties:
      base_strength:
        type: integer
      city:
        type: string
      current_strength:
        type: integer
      fatigue:
        type: number
      market_value:
        type: number
      morale:
        type: number
      team_id:
        type: integer
      team_name:
        type: string
    type: object
  models.WeekResult:
    properties:
      matches:
        items:
          $ref: '#/definitions/models.Match'
        type: array
      week:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for simulating a four-team football league, editing match
    results, rolling back state, and calculating championship probabilities.
  title: Football League Simulation API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns process liveness status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
  /league/next-week:
    post:
      description: Simulates the next week's matches and updates state
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Simulate next week
      tags:
      - league
  /league/overview:
    get:
      description: Returns the current league table, weekly match status, and predictions
        when available
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LeagueOverview'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Get league overview
      tags:
      - league
  /league/play-all:
    post:
      description: Simulates all remaining matches in the season
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Play all remaining weeks
      tags:
      - league
  /league/reset:
    post:
      description: Resets the entire league to initial state
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Reset league
      tags:
      - league
  /league/rollback/{week}:
    post:
      description: Reverts database state to a specific week
      parameters:
      - description: Week to rollback to
        in: path
        name: week
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Rollback league state
      tags:
      - league
  /league/table:
    get:
      description: Returns current league standings (PTS, W, D, L, GD)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Get current standings
      tags:
      - league
  /matches/{id}:
    get:
      description: Returns a specific match and its events
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Get match details
      tags:
      - matches
    put:
      consumes:
      - application/json
      description: Edits a specific match result; recalculates standings and morale
      parameters:
      - description: Match ID
        in: path
        name: id
        required: true
        type: integer
      - description: Edited score
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.EditMatchRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Edit match result
      tags:
      - matches
  /simulation/championship-probabilities:
    get:
      description: Runs 1,000 Monte Carlo simulations to calculate Championship Win
        %
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Championship probabilities
      tags:
      - simulation
  /teams/{id}/metrics:
    get:
      description: Returns a team's current Strength, Morale, Fatigue, and Market
        Value
      parameters:
      - description: Team ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TeamMetrics'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ProblemDetails'
      summary: Get team metrics
      tags:
      - teams
swagger: "2.0"
